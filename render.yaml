services:
  - type: web
    name: health-assistant
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    disks:
      - name: health-data
        mountPath: /data
        sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: NODE_VERSION
        value: "20"
      - key: GEMINI_API_KEY
        sync: false
