<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Health Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: hsl(168, 76%, 36%);
      --primary-hover: hsl(168, 76%, 28%);
      --primary-light: hsl(168, 40%, 94%);
      --primary-glow: hsla(168, 76%, 36%, 0.15);
      --bg-app: hsl(168, 12%, 97%);
      --bg-card: hsl(0, 0%, 100%);
      --border-color: hsl(200, 15%, 88%);
      --text-dark: hsl(210, 24%, 16%);
      --text-muted: hsl(210, 12%, 46%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.12);
      --radius-md: 12px;
      --radius-lg: 16px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --danger: hsl(0, 75%, 60%);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: linear-gradient(135deg, hsl(168, 20%, 95%), hsl(168, 10%, 90%));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .auth-container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
    .auth-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 40px 36px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255,255,255,0.6);
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .auth-logo-icon {
      width: 40px; height: 40px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
    }
    .auth-subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: all 0.15s ease;
      background: hsl(200, 15%, 97%);
    }
    .form-group input:focus {
      border-color: var(--primary);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .auth-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-top: 4px;
    }
    .auth-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .auth-error {
      background: hsl(0, 75%, 96%);
      color: var(--danger);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      display: none;
      border: 1px solid hsl(0, 70%, 90%);
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .name-row {
      display: flex;
      gap: 10px;
    }
    .name-row .form-group { flex: 1; }
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
      .name-row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <h1>Health Assistant</h1>
      </div>
      <p class="auth-subtitle">Create your account to get started</p>

      <div class="auth-error" id="auth-error"></div>

      <form id="signup-form">
        <div class="name-row">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" placeholder="John" required autocomplete="given-name">
          </div>
          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" placeholder="Doe" required autocomplete="family-name">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Repeat your password" required autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn" id="signup-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    const USERS_KEY = 'healthAssistantUsers';
    const SESSION_KEY = 'healthAssistantSession';

    function getUsers() {
      try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch(e) { return {}; }
    }

    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const firstName = document.getElementById('first-name').value.trim();
      const lastName = document.getElementById('last-name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const errorEl = document.getElementById('auth-error');
      const btn = document.getElementById('signup-btn');

      if (!firstName || !lastName || !email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters long.';
        errorEl.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      const users = getUsers();

      if (users[email]) {
        errorEl.textContent = 'An account with this email already exists. Please sign in.';
        errorEl.style.display = 'block';
        return;
      }

      const name = firstName + ' ' + lastName;
      users[email] = { name, firstName, lastName, password, createdAt: Date.now() };
      saveUsers(users);

      const session = { email, name, loginTime: Date.now() };
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
